<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Template</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0; /* Remove default body margins */
        }

        header {
            background-color: #f0f0f0;
            padding: 20px;
            text-align: center;
        }

        nav {
            float: left;
            width: 20%;
            background-color: #e0e0e0;
            padding: 20px;
            height: 300px; /* Just for demonstration, adjust as needed */
        }

        article {
            float: left;
            width: 60%;
            padding: 20px;
        }

        footer {
            background-color: #f0f0f0;
            padding: 20px;
            text-align: center;
            clear: both; /* Prevent footer from floating next to other elements */
        }

    </style>
</head>
<body>

    <header>
        <h1>Page Title</h1>
        <!-- Add header content like logo, navigation, etc. -->
    </header>

    <div class="clearfix">
        <nav>
            <ul>
                <li><a href="#">Link 1</a></li>
                <li><a href="#">Link 2</a></li>
                <li><a href="#">Link 3</a></li>
                <!-- Add more sidebar links here -->
            </ul>
        </nav>

        <article>
            <h2>Main Content Heading</h2>
            <p>This is the main content of the page. You can add paragraphs, images, and other elements here.</p>
        </article>
    </div>

    <footer>
        <p>© 2023 Your Name or Company</p>
    </footer>

</body>
</html>
