name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]  # Change this to your default branch if it's different
  workflow_dispatch:  # Allows manual triggering

permissions:
  contents: read  # Allow reading repository contents
  pages: write    # Allow writing to GitHub Pages
  id-token: write # Required for GitHub Pages deployment

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1  # Limit the checkout to the latest commit

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Specify the Node.js version

      - name: Install dependencies
        run: npm install  # Install dependencies before running the script

      - name: Run ssg script
        run: node ssg.js  # Your script to generate posts

      - name: Zip generated files
        run: |
          mkdir -p public
          zip -r public/site.zip public/*  # Zip all generated files into site.zip

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/site.zip  # Path to the zipped file

      - name: Download and unzip artifact
        run: |
          mkdir -p github-pages-deploy
          unzip public/site.zip -d github-pages-deploy  # Unzip the .zip file

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          path: github-pages-deploy  # Path to the unzipped files
